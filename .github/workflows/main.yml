name: Academic Tracker CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  php-validation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Display PHP Version
        run: php -v

      - name: Validate All PHP Files
        run: |
          find . -type f -name "*.php" -exec php -l {} \;

      - name: Check Important Files
        run: |
          test -f index.php
          test -f config.php
          test -f database.sql

      - name: Upload Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: academic-tracker-build
          path: .
